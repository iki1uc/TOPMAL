<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TOPMAL · RDY · 12X System · GEO + Effekte</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
nav { margin-bottom:20px; }
nav a { color:#6cf; margin-right:20px; text-decoration:none; font-size:20px; }
.box { background:#111; padding:20px; margin:20px 0; border-left:3px solid #6cf; }
pre { white-space:pre; }
h2 { color:#6cf; }
</style>

<!-- ROOT -->
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/ROOT.js"></script>

<!-- GEO + EFFECT -->
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/GEO.js"></script>
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/EFFECT.js"></script>

<!-- ENGINES -->
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/X1.js"></script>
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/y1.js"></script>

<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/X2.js"></script>
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/showX2.js"></script>

<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/12.js"></script>
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/24.js"></script>

<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/X4.js"></script>
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/showX4.js"></script>

<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/X5.js"></script>
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/showX5.js"></script>

<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/X6.js"></script>
<script src="https://cdn.jsdelivr.net/gh/iki1uc/RDY/showX6.js"></script>

</head>

<body>

<h1>TOPMAL · RDY · 12X System</h1>

<nav>
    <a href="#" onclick="show('geo')">GEO</a>
    <a href="#" onclick="show('effect')">Effekte</a>
    <a href="#" onclick="show('x1')">X1</a>
    <a href="#" onclick="show('x2')">X2</a>
    <a href="#" onclick="show('x3')">X3</a>
    <a href="#" onclick="show('x4')">X4</a>
    <a href="#" onclick="show('x5')">X5</a>
    <a href="#" onclick="show('x6')">X6</a>
</nav>

<div id="geo" class="box"></div>
<div id="effect" class="box"></div>

<div id="x1" class="box"></div>
<div id="x2" class="box"></div>
<div id="x3" class="box"></div>
<div id="x4" class="box"></div>
<div id="x5" class="box"></div>
<div id="x6" class="box"></div>

<script>
function show(id){
    document.querySelectorAll('.box').forEach(b => b.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

(async () => {

    /* ROOT */
    const files = await ALL_MASTER.start();

    /* GEO */
    const geo = GEO_MASTER.start(files);
    document.getElementById("geo").innerHTML =
        "<h2>GEO‑Layer</h2><pre>" + JSON.stringify(geo, null, 2) + "</pre>";

    /* EFFECT */
    const eff = EFFECT_MASTER.start(files);
    document.getElementById("effect").innerHTML =
        "<h2>Effekt‑Layer</h2><pre>" + JSON.stringify(eff, null, 2) + "</pre>";

    /* X1 */
    await showX1(files);

    /* X2 */
    await showX2(files);

    /* X3 */
    await showX3(files);

    /* X4 */
    await showX4(files);

    /* X5 */
    await showX5(files);

    /* X6 */
    await showX6(files);

    /* Startseite */
    show('geo');

})();
</script>

</body>
</html>
