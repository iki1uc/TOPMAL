<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TOPMAL · STATIONEN‑Viewer · 6E/6D</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { text-align:center; color:#6cf; }
.box { background:#111; padding:20px; margin:20px 0; border-left:3px solid #6cf; }
pre { white-space:pre; }
</style>

<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/X1.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/y1.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/12.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/24.js"></script>

</head>

<body>

<h1>TOPMAL · STATIONEN‑Viewer · 6E/6D</h1>

<div id="tech" class="box"></div>
<div id="x1" class="box"></div>
<div id="x3" class="box"></div>
<div id="stations" class="box"></div>

<script>
(async () => {

    /* TECH MODULE */
    const techFiles = ["RSP.tech","NC2.tech","6ED.tech","ROM.tech"];
    let techOut = "<h2>TECH‑Module</h2>";

    for(const f of techFiles){
        const res = await fetch(`https://raw.githubusercontent.com/iki1uc/TOPMAL/main/${f}`);
        const txt = await res.text();
        techOut += `<h3>${f}</h3><pre>${txt}</pre>`;
    }

    document.getElementById("tech").innerHTML = techOut;

    /* ROOT-DATEIEN */
    const files = await ALL_MASTER.start();

    /* X1 */
    await showX1(files);

    /* X3 */
    await showX3(files);

    /* STATIONEN */
    const res = await fetch("https://raw.githubusercontent.com/iki1uc/TOPMAL/main/STATIONEN.raw");
    const txt = await res.text();

    document.getElementById("stations").innerHTML =
        "<h2>STATIONEN.raw</h2><pre>" + txt + "</pre>";

})();
</script>

</body>
</html>
