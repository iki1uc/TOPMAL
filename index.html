<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TOPMAL · 12X System · GEO + Effekte</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
.box { background:#111; padding:20px; margin:20px 0; border-left:3px solid #6cf; }
pre { white-space:pre; }
h2 { color:#6cf; }
</style>

<!-- ROOT -->
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/ROOT.js"></script>

<!-- GEO + EFFECT -->
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/GEO.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/EFFECT.js"></script>

<!-- ENGINES -->
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/X1.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/y1.js"></script>

<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/X2.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/showX2.js"></script>

<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/12.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/24.js"></script>

<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/X4.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/showX4.js"></script>

<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/X5.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/showX5.js"></script>

<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/X6.js"></script>
<script src="https://raw.githubusercontent.com/iki1uc/TOPMAL/main/showX6.js"></script>

</head>

<body>

<h1>TOPMAL · 12X System · GEO + Effekte</h1>

<div id="geo" class="box"></div>
<div id="effect" class="box"></div>

<div id="x1" class="box"></div>
<div id="x2" class="box"></div>
<div id="x3" class="box"></div>
<div id="x4" class="box"></div>
<div id="x5" class="box"></div>
<div id="x6" class="box"></div>

<script>
(async () => {

    /* ROOT */
    const files = await ALL_MASTER.start();

    /* GEO */
    const geo = GEO_MASTER.start(files);
    document.getElementById("geo").innerHTML =
        "<h2>GEO‑Layer</h2><pre>" + JSON.stringify(geo, null, 2) + "</pre>";

    /* EFFECT */
    const eff = EFFECT_MASTER.start(files);
    document.getElementById("effect").innerHTML =
        "<h2>Effekt‑Layer</h2><pre>" + JSON.stringify(eff, null, 2) + "</pre>";

    /* X1 */
    await showX1(files);

    /* X2 */
    await showX2(files);

    /* X3 */
    await showX3(files);

    /* X4 */
    await showX4(files);

    /* X5 */
    await showX5(files);

    /* X6 */
    await showX6(files);

})();
</script>

</body>
</html>
