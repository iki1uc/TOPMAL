<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TOPMAL · 6E/6D · TECH‑Fusion</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
.box { background:#111; padding:20px; margin:20px 0; border-left:3px solid #6cf; }
pre { white-space:pre; }
</style>
</head>

<body>

<h1>TECH‑Fusion · 6E/6D</h1>

<div id="fusion" class="box"></div>

<script>
(async () => {

    const techFiles = ["RSP.tech","NC2.tech","6ED.tech","ROM.tech"];
    let out = "<h2>TECH‑Module</h2>";

    for(const f of techFiles){
        try {
            const res = await fetch(f);
            const txt = await res.text();
            out += `<h3>${f}</h3><pre>${txt}</pre>`;
        } catch {
            out += `<h3>${f}</h3><pre>(nicht gefunden)</pre>`;
        }
    }

    document.getElementById("fusion").innerHTML = out;

})();
</script>

</body>
</html>
