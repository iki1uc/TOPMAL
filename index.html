<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TOPMAL · ROOT‑Fusion</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { text-align:center; color:#6cf; }
.box { background:#111; padding:20px; margin:20px 0; border-left:3px solid #6cf; }
pre { white-space:pre; }
</style>
</head>

<body>

<h1>TOPMAL · ROOT‑Fusion</h1>

<div id="root" class="box"></div>

<script>
(async () => {

    const files = [
        "6E → 6D.tech",
        "6D‑Baum.raw",
        "12e allin allout.room",
        "D.room",
        "NC²",
        "NC² (1)",
        "NC²octa².dual",
        "NC²octa²□.merge",
        "NC²□ (1).lock",
        "NC²□ (1).sync",
        "NC²□.lock",
        "NC²□.sync",
        "NC²□octa³.align"
    ];

    let out = "<h2>ROOT‑Fusion</h2>";

    for(const f of files){
        try {
            const res = await fetch(f);
            const txt = await res.text();
            out += `<h3>${f}</h3><pre>${txt}</pre>`;
        } catch {
            out += `<h3>${f}</h3><pre>(nicht gefunden)</pre>`;
        }
    }

    document.getElementById("root").innerHTML = out;

})();
</script>

</body>
</html>
