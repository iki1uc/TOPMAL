<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TOPMAL · STATIONEN‑Viewer</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { text-align:center; color:#6cf; }
.box { background:#111; padding:20px; margin:20px 0; border-left:3px solid #6cf; }
pre { white-space:pre; }
</style>
</head>

<body>

<h1>TOPMAL · STATIONEN‑Viewer</h1>

<div id="stations" class="box"></div>

<script>
(async () => {
    const res = await fetch("STATIONEN.raw");
    const txt = await res.text();

    document.getElementById("stations").innerHTML =
        "<h2>STATIONEN.raw</h2><pre>" + txt + "</pre>";
})();
</script>

</body>
</html>
